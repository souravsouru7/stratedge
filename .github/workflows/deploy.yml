name: Deploy To EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run edge case tests
        working-directory: backend
        run: npm run test:manual
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/coverage/
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: always() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment..."
            cd ~/stratedge
            
            # Git operations
            git config --global --add safe.directory ~/stratedge || true
            git fetch origin main
            git reset --hard origin/main
            
            echo "📦 Installing production dependencies..."
            cd ~/stratedge/backend
            
            # Install ONLY production dependencies (faster, smaller)
            npm install --production --no-optional
            
            # Clean npm cache to save disk space
            npm cache clean --force 2>/dev/null || true
            
            echo "🔄 Restarting PM2 processes..."
            # Graceful restart
            pm2 reload ecosystem.config.js --update-env || \
            pm2 start ecosystem.config.js || \
            pm2 restart ecosystem.config.js
            
            # Save PM2 process list
            pm2 save
            
            echo "✅ Deployment completed successfully!"
            
            # Show PM2 status
            pm2 status
            
            # Check for errors in recent logs
            echo "📋 Recent logs:"
            pm2 logs stratedge-api --lines 5 --nostream 2>/dev/null || true
